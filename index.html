<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Untuk Kamu</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Poppins', sans-serif;
}

body {
    background: linear-gradient(135deg, #f8e1e7, #e3d7ff);
    overflow-x: hidden;
}

/* container */
.container {
    max-width: 500px;
    margin: 50px auto;
    padding: 20px;
}

/* card */
.card {
    backdrop-filter: blur(15px);
    background: rgba(255,255,255,0.3);
    border-radius: 25px;
    padding: 25px;
    text-align: center;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
    margin-bottom: 20px;
}

/* teks */
h1 {
    font-size: 24px;
    margin-bottom: 10px;
}

p {
    font-size: 14px;
    line-height: 1.6;
    margin-bottom: 20px;
}

/* gallery */
.gallery {
    display: flex;
    overflow-x: auto;
    gap: 10px;
    scroll-snap-type: x mandatory;
    padding-bottom: 10px;
}

.gallery img {
    width: 150px;
    height: 200px;
    object-fit: cover;
    border-radius: 15px;
    scroll-snap-align: center;
    transition: 0.3s;
}

.gallery img:hover {
    transform: scale(1.05);
}

/* tombol */
button {
    padding: 10px 18px;
    margin: 5px;
    border: none;
    border-radius: 12px;
    cursor: pointer;
}

.yes {
    background: #6c63ff;
    color: white;
}

.no {
    background: #ddd;
    position: absolute;
}

/* efek light */
.light {
    position: absolute;
    width: 8px;
    height: 8px;
    background: white;
    opacity: 0.5;
    border-radius: 50%;
    animation: float 8s linear infinite;
}

@keyframes float {
    from { transform: translateY(100vh); }
    to { transform: translateY(-10vh); }
}
</style>
</head>

<body>

<div class="container">

    <div class="card">
        <h1>Untuk Kamu</h1>
        <p>
            Aku tahu aku salah.  
            Aku nggak mau kehilangan kamu cuma karena kesalahan aku.  
            Aku minta maaf, dan aku beneran ingin memperbaiki semuanya.
        </p>
    </div>

    <!-- GALERI FOTO -->
    <div class="card">
        <div class="gallery">
            <img src="foto1.jpg">
            <img src="foto1.jpg">
            <img src="foto2.jpg">
            <img src="foto3.jpg">
            <img src="foto4.jpg">
            <img src="foto5.jpg">
            <img src="foto6.jpg">
            <img src="foto7.jpg">
            <img src="foto8.jpg">
            <img src="foto9.jpg">
            <img src="foto10.jpg">
            <img src="foto11.jpg">
        </div>
    </div>

    <!-- TOMBOL -->
    <div class="card">
        <button class="yes" onclick="nextPage()">Aku maafin</button>
        <button class="no" onmouseover="moveButton(this)">Tidak</button>
    </div>

</div>

<script>
function moveButton(btn) {
    let x = Math.random() * (window.innerWidth - 100);
    let y = Math.random() * (window.innerHeight - 50);
    btn.style.left = x + "px";
    btn.style.top = y + "px";
}

function nextPage() {
    document.body.innerHTML = `
        <div style="text-align:center; margin-top:100px;">
            <h1>Terima kasih</h1>
            <p>Aku janji akan jadi lebih baik.</p>
        </div>
    `;
}

// efek light aesthetic
setInterval(() => {
    let light = document.createElement("div");
    light.classList.add("light");
    light.style.left = Math.random() * window.innerWidth + "px";

    document.body.appendChild(light);

    setTimeout(() => {
        light.remove();
    }, 8000);
}, 400);
</script>

</body>
</html>
